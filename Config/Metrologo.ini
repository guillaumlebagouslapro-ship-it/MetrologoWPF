; Déclarations des terminateurs de chaîne en écriture (WriteTerm)
;   NULLEnd = 0     (Pas de fin d'écriture)
;   NLEnd   = 1     (New Line ajouté en fin de transfert)
;   DABEnd  = 2     (EOI positionné en fin de transfert)
;
; Déclarations des terminateurs de chaîne en lecture (ReadTerm)
;   STOPEnd = 256   (Fin de lecture sur EOI)
;   Autre caractère : indiquer le code ASCII

