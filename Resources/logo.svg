<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fond navy arrondi -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2F4D"/>
      <stop offset="1" stop-color="#2C4870"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Onde sinusoïdale principale (blanche) -->
  <path d="M 30 128
           Q 60 60, 90 128
           T 150 128
           T 210 128
           T 230 128"
        stroke="white" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Ligne pointillée centrale (axe) -->
  <line x1="30" y1="128" x2="230" y2="128"
        stroke="white" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.35"/>

  <!-- Points "marqueurs" orange (échantillonnage) -->
  <circle cx="60" cy="80" r="6" fill="#FF8A1F"/>
  <circle cx="120" cy="176" r="6" fill="#FF8A1F"/>
  <circle cx="180" cy="80" r="6" fill="#FF8A1F"/>

  <!-- Lettre M discrète en bas -->
  <text x="128" y="222" font-family="Segoe UI, Arial, sans-serif"
        font-size="34" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="2">M</text>
</svg>
